<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小贾私房菜</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- 顶部导航栏 -->
    <header class="header">
        <h1 class="logo">小贾私房菜</h1>
        <div class="search-container">
            <input type="text" id="search-input" placeholder="搜索菜品、价格或描述...">
        </div>
        <button id="admin-toggle" class="admin-button">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 15C15.866 15 19 11.866 19 8C19 4.13401 15.866 1 12 1C8.13401 1 5 4.13401 5 8C5 11.866 8.13401 15 12 15Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M12 15C12 15 15 21 15 21H9C9 21 12 15 12 15Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M12 9V11" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                <path d="M12 5V5.01" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
        </button>
    </header>

    <!-- 标签筛选栏 -->
    <div class="tags-container">
        <div class="tags-wrapper" id="tags-wrapper">
            <!-- 标签将通过JS动态生成 -->
        </div>
    </div>

    <!-- 主内容区 -->
    <main class="main-content">
        <!-- 菜品卡片将通过JS动态生成 -->
        <div class="menu-grid" id="menu-grid">
        </div>
    </main>

    <!-- 购物车 -->
    <div class="cart-container" id="cart-container">
        <div class="cart-header">
            <h3>购物车</h3>
            <button id="cart-toggle" class="cart-toggle">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M3 3H5L5.4 5M5.4 5H20.5C21.0523 5 21.5 5.44772 21.5 6V19C21.5 19.5523 21.0523 20 20.5 20H3.5C2.94772 20 2.5 19.5523 2.5 19V6C2.5 5.44772 2.94772 5 3.5 5H5.4ZM8 10C9.10457 10 10 9.10457 10 8C10 6.89543 9.10457 6 8 6C6.89543 6 6 6.89543 6 8C6 9.10457 6.89543 10 8 10ZM16 10C17.1046 10 18 9.10457 18 8C18 6.89543 17.1046 6 16 6C14.8954 6 14 6.89543 14 8C14 9.10457 14.8954 10 16 10Z" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>
        <div class="cart-content" id="cart-content">
            <div class="cart-items" id="cart-items">
                <!-- 购物车项目将通过JS动态生成 -->
            </div>
            <div class="cart-summary" id="cart-summary">
                <div class="total">
                    <span>合计:</span>
                    <span id="total-price">¥0.00</span>
                </div>
                <button class="checkout-button">结算</button>
            </div>
        </div>
    </div>

    <!-- 菜品详情模态框 -->
    <div class="modal" id="dish-modal">
        <div class="modal-content">
            <button class="modal-close" id="modal-close">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
            <div class="dish-detail" id="dish-detail">
                <!-- 菜品详情将通过JS动态生成 -->
            </div>
        </div>
    </div>

    <!-- 管理员模式 -->
    <div class="admin-panel" id="admin-panel">
        <div class="admin-header">
            <h3>管理员模式</h3>
            <button id="admin-close" class="admin-close">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <path d="M18 6L6 18M6 6L18 18" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
            </button>
        </div>
        <div class="admin-content">
            <div class="admin-section">
                <h4>编辑菜品</h4>
                <form id="dish-form">
                    <input type="text" placeholder="菜品名称" id="dish-name">
                    <input type="number" placeholder="价格" id="dish-price">
                    <input type="text" placeholder="图片URL" id="dish-image">
                    <textarea placeholder="菜品简介" id="dish-desc"></textarea>
                    <textarea placeholder="详细描述" id="dish-detail-desc"></textarea>
                    <textarea placeholder="制作方法" id="dish-method"></textarea>
                    <textarea placeholder="用料" id="dish-ingredients"></textarea>
                    <input type="text" placeholder="标签 (用逗号分隔)" id="dish-tags">
                    <button type="submit">保存菜品</button>
                </form>
            </div>
            <div class="admin-section">
                <h4>管理标签</h4>
                <div class="tags-list" id="tags-list">
                    <!-- 标签列表将通过JS动态生成 -->
                </div>
                <form id="tag-form">
                    <input type="text" placeholder="添加新标签" id="tag-name">
                    <button type="submit">添加标签</button>
                </form>
            </div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="script.js"></script>
</body>
</html>
